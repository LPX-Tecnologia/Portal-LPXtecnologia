<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LPX Tecnologia - Portal Multi-Lojas</title>
    
    <!-- CSS Compartilhado -->
    <link rel="stylesheet" href="../shared/css/shared-components.css">
    <!-- CSS do Portal -->
    <link rel="stylesheet" href="css/portal-style.css">
    
    <!-- Fontes -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Header -->
    <header class="portal-header">
        <div class="portal-header-container">
            <div class="portal-logo-area">
                <div class="portal-logo-circle">
                    <img src="../assets/images/logo-lpx-tecnologia.jpg" alt="LPX Tecnologia" id="headerLogo">
                </div>
                <div class="portal-header-info">
                    <h1>LPX Tecnologia</h1>
                    <p>Inovação que transforma</p>
                </div>
            </div>
            <div class="portal-header-actions">
                <button class="portal-theme-btn" onclick="toggleTema()" title="Alternar tema">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Conteúdo Principal -->
    <main class="portal-main">
        <!-- Card da Loja em Destaque -->
        <div class="portal-featured-card">
            <div class="portal-featured-profile">
                <img src="../assets/images/logo-lpx-tecnologia.jpg" alt="Loja" id="featuredLogo">
                <h2 id="featuredNome">LPX Tecnologia</h2>
                <p id="featuredSlogan">Inovação que transforma</p>
                <div id="featuredStats">⭐ 5.0 • ✂️ 1.2k serviços • 📍 2.5km</div>
            </div>
            
            <!-- Carrossel de Lojas -->
            <div class="portal-carousel-section">
                <h3>🏪 Lojas Disponíveis</h3>
                <div class="portal-carousel" id="lojasCarousel"></div>
            </div>
            
            <!-- Botões de Ação -->
            <div class="portal-actions">
                <button class="btn btn-primary btn-block" onclick="entrarNaLoja()">
                    <i class="fas fa-sign-in-alt"></i> ENTRAR NESTA LOJA
                </button>
                <button class="btn btn-outline btn-block" onclick="mostrarCadastroLoja()">
                    <i class="fas fa-plus-circle"></i> CADASTRAR MINHA LOJA
                </button>
            </div>
            
            <!-- Formulário de Login -->
            <div id="loginSection" style="display:none;">
                <div class="portal-tabs">
                    <button class="portal-tab active" onclick="switchTab('cliente')">👤 Cliente</button>
                    <button class="portal-tab" onclick="switchTab('barbeiro')">✂️ Profissional</button>
                </div>
                
                <form id="formCliente" class="portal-form" onsubmit="event.preventDefault(); loginCliente();">
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="loginEmailCliente" placeholder="seu@email.com" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="loginSenhaCliente" placeholder="Sua senha" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">ENTRAR</button>
                    <p class="portal-link" onclick="mostrarCadastroCliente()">Criar conta de cliente</p>
                </form>
                
                <form id="formBarbeiro" class="portal-form" style="display:none;" onsubmit="event.preventDefault(); loginBarbeiro();">
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="loginEmailBarbeiro" placeholder="profissional@email.com" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="loginSenhaBarbeiro" placeholder="Sua senha" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">ENTRAR</button>
                    <p class="portal-link" onclick="mostrarCadastroBarbeiro()">Criar conta profissional</p>
                </form>
            </div>
        </div>
    </main>

    <!-- Toast -->
    <div class="toast" id="toast" style="display:none;"></div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <!-- Scripts Compartilhados -->
    <script src="../shared/js/firebase-config.js"></script>
    <script src="../shared/js/utils.js"></script>
    
    <!-- Scripts do Portal -->
    <script src="js/portal-tema.js"></script>
    <script src="js/portal-lojas.js"></script>
    <script src="js/portal-auth.js"></script>
    <script src="js/portal-main.js"></script>
</body>
</html>
