<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0; url=./portal/">
    <title>LPX Tecnologia - Portal Multi-Lojas</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: white;
            font-family: 'Inter', 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .loader {
            border: 3px solid #333;
            border-top: 3px solid #D4A84B;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h1 { font-size: 24px; margin-bottom: 10px; }
        p { color: #9CA3AF; }
        a { color: #D4A84B; text-decoration: none; }
    </style>
</head>
<body>
    <div>
        <h1>🚀 LPX Tecnologia</h1>
        <div class="loader"></div>
        <p>Redirecionando para o portal...</p>
        <p><a href="./portal/">👉 ENTRAR NO PORTAL 👈</a></p>
    </div>
</body>
</html>
