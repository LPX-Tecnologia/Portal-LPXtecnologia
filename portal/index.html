<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a0a">
    <title>LPX Tecnologia - Portal Multi-Lojas</title>
    
    <!-- CSS -->
    <link rel="stylesheet" href="./style.css">
    
    <!-- Fontes -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>

    <!-- HEADER -->
    <header class="header" id="mainHeader">
        <div class="header-container">
            <div class="header-logo-area">
                <div class="logo-circle" id="headerLogoCircle">
                    <img src="../assets/images/logo-lpx-tecnologia.jpg" alt="LPX Tecnologia" class="logo-img" id="headerLogoImg">
                </div>
                <div class="header-info">
                    <h1 class="header-title" id="headerTitle">LPX Tecnologia</h1>
                    <p class="header-slogan" id="headerSlogan">Inovação que transforma</p>
                </div>
            </div>
            <div class="header-actions">
                <button class="header-btn" onclick="mostrarTela('loginScreen')" title="Loja">
                    <i class="fas fa-store"></i>
                </button>
                <button class="header-btn" id="btnTema" onclick="toggleModoEscuro()" title="Tema">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </div>
        <div class="header-gradient-line"></div>
    </header>

    <!-- TELA: PORTAL DE LOJAS -->
    <section class="screen active" id="loginScreen">
        <div class="portal-wrapper">
            <div class="portal-card">
                <div class="portal-profile">
                    <div class="portal-avatar-container">
                        <img src="../assets/images/logo-lpx-tecnologia.jpg" alt="Loja" class="portal-avatar" id="portalLogo">
                        <div class="portal-avatar-ring"></div>
                    </div>
                    <div class="portal-divider-gold"></div>
                    <h2 class="portal-store-name" id="portalNomeLoja">LPX Tecnologia</h2>
                    <p class="portal-store-slogan" id="portalSloganLoja">Inovação que transforma</p>
                    <div class="portal-stats-row" id="portalStats">
                        <span class="portal-stat"><i class="fas fa-star"></i> 5.0</span>
                        <span class="portal-stat"><i class="fas fa-store"></i> 1.2k</span>
                        <span class="portal-stat"><i class="fas fa-map-marker-alt"></i> 2.5km</span>
                    </div>
                </div>
                
                <div class="portal-carousel-section">
                    <div class="portal-carousel-header">
                        <span class="portal-carousel-title">🏪 Lojas Disponíveis</span>
                        <span class="portal-carousel-hint">← Deslize →</span>
                    </div>
                    <div class="portal-carousel-track" id="portalCarrossel"></div>
                </div>
                
                <div class="portal-actions">
                    <button class="portal-btn portal-btn-primary" onclick="entrarNaLoja()">
                        <i class="fas fa-sign-in-alt"></i> ENTRAR NESTA LOJA
                    </button>
                    <button class="portal-btn portal-btn-outline" onclick="mostrarTela('cadastroLojaScreen')">
                        <i class="fas fa-plus-circle"></i> CADASTRAR MINHA LOJA
                    </button>
                </div>
                
                <div id="loginFormsContainer" style="display:none;">
                    <div class="portal-login-tabs">
                        <button class="login-tab active" onclick="switchLoginTab('cliente')">👤 Cliente</button>
                        <button class="login-tab" onclick="switchLoginTab('barbeiro')">✂️ Profissional</button>
                    </div>
                    <div id="loginFormCliente" class="login-form">
                        <div class="input-group-modern">
                            <i class="fas fa-envelope input-icon"></i>
                            <input type="email" id="loginEmailCliente" placeholder="seu@email.com">
                        </div>
                        <div class="input-group-modern">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" id="loginSenhaCliente" placeholder="Sua senha">
                        </div>
                        <button class="portal-btn portal-btn-primary" onclick="loginCliente()">
                            <i class="fas fa-key"></i> ENTRAR
                        </button>
                        <button class="portal-btn portal-btn-text" onclick="mostrarTela('cadastroClienteScreen')">
                            Criar conta de cliente
                        </button>
                    </div>
                    <div id="loginFormBarbeiro" class="login-form" style="display:none;">
                        <div class="input-group-modern">
                            <i class="fas fa-envelope input-icon"></i>
                            <input type="email" id="loginEmailBarbeiro" placeholder="profissional@email.com">
                        </div>
                        <div class="input-group-modern">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" id="loginSenhaBarbeiro" placeholder="Sua senha">
                        </div>
                        <button class="portal-btn portal-btn-secondary" onclick="loginBarbeiro()">
                            <i class="fas fa-key"></i> ENTRAR
                        </button>
                        <button class="portal-btn portal-btn-text" onclick="mostrarTela('cadastroBarbeiroScreen')">
                            Criar conta profissional
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- DEMAIS TELAS AQUI... -->
    <!-- (Use o mesmo HTML que você já tem para as outras telas) -->

    <!-- TOAST / MODAL -->
    <div class="toast-modern" id="toast" style="display:none;"></div>
    <div class="modal-modern" id="modalConfirmacao">
        <div class="modal-content-modern">
            <div class="modal-header-modern">
                <h3 id="modalConfirmacaoTitulo">Confirmar</h3>
                <button onclick="fecharModal('modalConfirmacao')">✕</button>
            </div>
            <div class="modal-body-modern">
                <p id="modalConfirmacaoMensagem">Tem certeza?</p>
            </div>
            <div class="modal-footer-modern" style="flex-direction:row;gap:10px;">
                <button class="portal-btn portal-btn-outline" onclick="fecharModal('modalConfirmacao')" style="flex:1;">Não</button>
                <button class="portal-btn portal-btn-primary" id="modalConfirmacaoBtnSim" style="flex:1;">Sim</button>
            </div>
        </div>
    </div>

    <div class="modal-modern" id="modalValor">
        <div class="modal-content-modern">
            <div class="modal-header-modern">
                <h3 id="modalValorTitulo">💰 Valor do Serviço</h3>
                <button onclick="fecharModal('modalValor')">✕</button>
            </div>
            <div class="modal-body-modern">
                <div class="input-group-modern">
                    <i class="fas fa-dollar-sign input-icon"></i>
                    <input type="number" id="modalValorInput" placeholder="0.00" step="0.01" min="0">
                </div>
            </div>
            <div class="modal-footer-modern" style="flex-direction:row;gap:10px;">
                <button class="portal-btn portal-btn-outline" onclick="fecharModal('modalValor')" style="flex:1;">Cancelar</button>
                <button class="portal-btn portal-btn-primary" id="modalValorBtnConfirmar" style="flex:1;">Confirmar</button>
            </div>
        </div>
    </div>

    <script src="./script.js"></script>
</body>
</html>
